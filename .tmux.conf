UptoTmux21="[ $(tmux -V | sed 's/^tmux \\([0-9.]\\{1,\\}\\).*/\\1 < 2.1/'| bc) = 1 ]"
FromTmux21="[ $(tmux -V | sed 's/^tmux \\([0-9.]\\{1,\\}\\).*/\\1 >= 2.1/'| bc) = 1 ]"
UptoTmux24="[ $(tmux -V | sed 's/^tmux \\([0-9.]\\{1,\\}\\).*/\\1 < 2.4/'| bc) = 1 ]"
FromTmux24="[ $(tmux -V | sed 's/^tmux \\([0-9.]\\{1,\\}\\).*/\\1 >= 2.4/'| bc) = 1 ]"
UptoTmux29="[ $(tmux -V | sed 's/^tmux \\([0-9.]\\{1,\\}\\).*/\\1 < 2.9/'| bc) = 1 ]"
FromTmux29="[ $(tmux -V | sed 's/^tmux \\([0-9.]\\{1,\\}\\).*/\\1 >= 2.9/'| bc) = 1 ]"
OnMacOS="[ \"$(uname)\" == \"Darwin\" ]"

set   -g base-index 1               # enumerate windows starting from 1
setw  -g pane-base-index 1          # enumerate panes starting from 1
set  -sg escape-time 1              # set no delay for escape key press

# set terminal window title to be a name of tmux window
set-option -g set-titles on
set-option -g set-titles-string "#S / #W"


if-shell "$OnMacOS" 'set -g default-shell $SHELL'
if-shell "$OnMacOS" 'set -g default-command "reattach-to-user-namespace -l ${SHELL}"'

# diasble mouse (see also toggle mouse):

if-shell "$UptoTmux21" 'set -g mode-mouse off'
if-shell "$UptoTmux21" 'set -g mouse-resize-pane off'
if-shell "$UptoTmux21" 'set -g mouse-select-pane off'
if-shell "$UptoTmux21" 'set -g mouse-select-window off'

if-shell "$FromTmux21" 'set -g mouse on ; set -g mouse off'

# save current path when open new panes

bind-key c   new-window   -c "#{pane_current_path}"
bind-key %   split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

# vim keybindings for panes traversal

unbind Left
unbind Down
unbind Up
unbind Right

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# use vim keys for traversal in selection and copy mode
# (note: not copy and paste from system clipboard)

setw -g mode-keys vi

if-shell "$UptoTmux24" 'unbind -t vi-copy Space'
if-shell "$UptoTmux24" 'unbind -t vi-copy Enter'
if-shell "$UptoTmux24" 'bind -t vi-copy v begin-selection'
if-shell "$UptoTmux24" 'bind -t vi-copy y copy-selection'
if-shell "$UptoTmux24" 'bind -t vi-copy Escape cancel'

if-shell "$FromTmux24" 'unbind -Tcopy-mode-vi Space'
if-shell "$FromTmux24" 'unbind -Tcopy-mode-vi Enter'
if-shell "$FromTmux24" 'bind -Tcopy-mode-vi v send -X begin-selection'
if-shell "$FromTmux24" 'bind -Tcopy-mode-vi y send -X copy-selection'
if-shell "$FromTmux24" 'bind -Tcopy-mode-vi Escape send -X cancel'

# Toggle activity monitor (see also status-right)

set -g monitor-activity off

bind M-a \
  set -w monitor-activity on \;\
  display "Monitor Activity ON"

bind C-a \
  set -w monitor-activity off \;\
  display "Monitor Activity OFF"

# reload tmux config file

bind M-r \
  source-file ~/.tmux.conf \;\
  display-message "reLoad ~/.tmux.conf"

# reassign windows numbers

bind M-w \
  move-window -r \;\
  display-message "reEnumerating windows..."

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n M-h if-shell "$is_vim" "send-keys M-h"  "select-pane -L"
bind-key -n M-j if-shell "$is_vim" "send-keys M-j"  "select-pane -D"
bind-key -n M-k if-shell "$is_vim" "send-keys M-k"  "select-pane -U"
bind-key -n M-l if-shell "$is_vim" "send-keys M-l"  "select-pane -R"
bind-key -T copy-mode-vi M-h select-pane -L
bind-key -T copy-mode-vi M-j select-pane -D
bind-key -T copy-mode-vi M-k select-pane -U
bind-key -T copy-mode-vi M-l select-pane -R
# turn on focus events reporting to focus detection in vim
set -g focus-events on


# toggle mouse (see also status-right):

if-shell "$UptoTmux24" 'bind M-m set -g mode-mouse on \; set -g mouse-resize-pane \; set -g mouse-select-pane \; set -g mouse-select-window \; display "Mouse ON"'
if-shell "$FromTmux21" 'bind M-m set -g mouse on \; display "Mouse ON"'

if-shell "$FromTmux21" 'bind C-m set -g mouse off \; display "Mouse OFF"'
if-shell "$UptoTmux24" 'bind C-m set -g mode-mouse off \; set -g mouse-resize-pane \; set -g mouse-select-pane \; set -g mouse-select-window \; display "Mouse OFF"'



# status left
set -g status-left " #H/#S "
set -g status-left-length 48

# status right
set -g status-right " %a %d %b %T "
set -g status-right-length 100
set -g status-justify centre

# WINDOWS
setw -g window-status-current-format " #[bold]#I:#W#F "
setw -g window-status-format " #I:#W#F "
setw -g alternate-screen on
setw -g window-status-current-style reverse

#setw -g automatic-rename on
#setw -g automatic-rename-format "#{pane_current_command}"
#setw -g automatic-rename-format "#(ps --no-headers -p #{pane_pid} -o args -O-c)"
#setw -g automatic-rename-format "#(ps -t #{pane_tty} -o start=,args= -c | tail -1| cut -c9-)"



# COLORS
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"



# colorscheme one
# setw -g window-active-style bg=terminal
# setw -g window-style        bg=colour255
# 
# Statusline
set -g status-interval 1
# set -g status-style bg=colour252,fg=default
# 
# # Statusline commands/messages
# set -g message-style bg=terminal,fg=default
# set -g message-command-style bg=terminal,fg=default


# colorscheme pencil

# window

if-shell "$FromTmux29" 'setw -g window-active-style bg=terminal,fg=terminal'
if-shell "$FromTmux29" 'setw -g window-style bg=terminal,bright,fg=terminal'


# statusline
set -g status-bg default # transparent
set -g status-fg magenta
if-shell "$UptoTmux29" 'set -g status-attr default'
if-shell "$FromTmux29" 'set -g status-style default'

# default window title colors
if-shell "$UptoTmux29" 'setw -g window-status-fg blue'
if-shell "$UptoTmux29" 'setw -g window-status-bg default'
if-shell "$UptoTmux29" 'setw -g window-status-attr dim'

if-shell "$FromTmux29" 'setw -g window-status-style fg=blue,bg=default,dim'

# active window title colors
if-shell "$UptoTmux29" 'setw -g window-status-current-fg brightred'
if-shell "$UptoTmux29" 'setw -g window-status-current-bg default'
if-shell "$UptoTmux29" 'setw -g window-status-current-attr bright'

if-shell "$FromTmux29" 'setw -g window-status-current-style fg=brightred,bg=default,bright'

# bell alerted window color
if-shell "$UptoTmux29" 'setw -g window-status-bell-bg red'
if-shell "$UptoTmux29" 'setw -g window-status-bell-fg white'
if-shell "$UptoTmux29" 'setw -g window-status-bell-attr bright'

if-shell "$FromTmux29" 'setw -g window-status-bell-style fg=white,bg=red,bright'

# content alerted color
if-shell "$UptoTmux29" 'setw -g window-status-activity-bg blue'
if-shell "$UptoTmux29" 'setw -g window-status-activity-fg white'
if-shell "$UptoTmux29" 'setw -g window-status-activity-attr bright'

if-shell "$FromTmux29" 'setw -g window-status-activity-style fg=blue,bg=white,bright'

# pane borders
if-shell "$UptoTmux29" 'set -g pane-border-fg white'
if-shell "$UptoTmux29" 'set -g pane-border-bg default'
if-shell "$UptoTmux29" 'set -g pane-active-border-fg brightblack'
if-shell "$UptoTmux29" 'set -g pane-active-border-bg default'

if-shell "$FromTmux29" 'set -g pane-border-style fg=blue,bg=default'
if-shell "$FromTmux29" 'set -g pane-active-border-style fg=white,bg=default'

# command line
if-shell "$UptoTmux29" 'set -g message-fg default'
if-shell "$UptoTmux29" 'set -g message-bg default'
if-shell "$UptoTmux29" 'set -g message-attr bright'

if-shell "$FromTmux29" 'set -g message-style fg=default,bg=default,bright'

