set   -g base-index 1               # enumerate windows starting from 1
setw  -g pane-base-index 1          # enumerate panes starting from 1
set  -sg escape-time 0              # set no delay for escape key press

# diasble mouse (see also toggle mouse):
if-shell '[ $(echo "`tmux -V | cut -d" " -f2` >= 2.1" | bc) -eq 1 ]' 'set -g mouse off'
if-shell '[ $(echo "`tmux -V | cut -d" " -f2` < 2.1"  | bc) -eq 1 ]' 'set -g mode-mouse off\; set -g mouse-resize-pane off\; set -g mouse-select-pane off\; set -g mouse-select-window off'

# save current path when open new panes
bind-key %   split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

# unbind default pane traversal keys
unbind Left
unbind Down
unbind Up
unbind Right

# define vim bindings for panes traversal
bind h select-pane -L # pane left  -> CTRL+b+h
bind j select-pane -D # pane down  -> CTRL+b+j
bind k select-pane -U # pane up    -> CTRL+b+k
bind l select-pane -R # pane right -> CTRL+b+l

# use vim keys for traversal in selection and copy mode
# (note: not copy and paste from system clipboard)
setw -g mode-keys vi
unbind -t vi-copy Space            # unbind default begin selection key
unbind -t vi-copy Enter            # unbind default copy key
bind -t vi-copy v begin-selection  # begin selection with v
bind -t vi-copy y copy-selection   # copy with y
bind -t vi-copy Escape cancel      # cancel selection with escape


# toggle activity monitor (see also status-right)
bind M-a set -w monitor-activity \; display-message "toggle monitor-activity..."
# reload tmux config file
bind M-r source-file ~/.tmux.conf \; display-message "config reloaded reloaded..."
# reassign windows numbers
bind M-w move-window -r \; display-message "enumerating windows..."
bind M-j command-prompt -p "join pane from:"  "join-pane -s ':%%'"
bind M-s command-prompt -p "send pane to:"  "join-pane -t ':%%'"


# toggle mouse (see also status-right):
if-shell '[ $(echo "`tmux -V | cut -d" " -f2` >= 2.1" | bc) -eq 1 ]]' 'bind M-m set -g mouse\; refresh-client -S'
if-shell '[ $(echo "`tmux -V | cut -d" " -f2` < 2.1"  | bc) -eq 1 ]]' 'bind M-m set -g mode-mouse\; set -g mouse-resize-pane\; set -g mouse-select-pane\; set -g mouse-select-window\; refresh-client -S'

# Statusline
set -g status-interval 1

set -g status-left "#[fg=colour2]▉#[fg=colour4]▉#[fg=colour5]▉#[fg=colour10] #[bold]#H:#[fg=colour14]#S "
set -g status-left-length 24

set -g status-right "#(tmux show -w monitor-activity) "

if-shell '[ $(echo "`tmux -V | cut -d" " -f2` >= 2.1" | bc) -eq 1 ]]' 'set -ga status-right "mouse #(tmux show -gv mouse) "'
if-shell '[ $(echo "`tmux -V | cut -d" " -f2` < 2.1"  | bc) -eq 1 ]]' 'set -ga status-right "mouse #(tmux show -gv mode-mouse) "'

set -ga status-right "%a-%d-%b %T #[fg=colour5]▉#[fg=colour4]▉#[fg=colour2]▉"
set -g status-right-length 56
set -g status-justify left

# WINDOWS
set -w -g window-status-current-format " #[bold]#I:#W#F "
set -w -g window-status-format " #I:#W#F "
set -w -g alternate-screen on

set   -g monitor-activity off       # disable monitor activity for new windows

# COLORS
set -g default-terminal "screen-256color"
