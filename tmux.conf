# rebind default prefix

# vim-style copy/paste (not a copy/paste to system clipboard)
setw -g mode-keys vi

# start selection with v instead of space
unbind -t vi-copy Space
bind -t vi-copy v begin-selection

# start copy with y instead of enter
unbind -t vi-copy Enter
bind -t vi-copy y copy-selection
bind -t vi-copy Escape cancel

# save current path when open panes
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -c "#{pane_current_path}"

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1

# mouse (allso see status-right below):
#   defaults: mouse -> off
#   m -> toggle mouse on and off
#
# before tmux 2.1: mode-mouse and mouse-* methods
# from tmux 2.1  : mode-mouse and mouse-* methods -> mouse
if-shell '[[ $(echo "$(tmux -V | cut -d" " -f2) >= 2.1" | bc) -eq 1 ]]' \
  'set -g mouse off; bind m set -g mouse \; refresh-client -S' \
  'set -g mode-mouse off; set -g mouse-resize-pane off; set -g mouse-select-pane off; set -g mouse-select-window off; bind m set -g mode-mouse \; set -g mouse-resize-pane \; set -g mouse-select-pane \; set -g mouse-select-window \; refresh-client -S'

# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# unbind arrow traversal to avoid inconsistency
unbind Left
unbind Down
unbind Up
unbind Right
# Use Alt-vim keys without prefix key to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# No delay for escape key press
set -sg escape-time 0

# reload config faster
bind R source-file ~/.tmux.conf \; \
  display-message "config reloaded reloaded..."

# enable and disable activity monitor (also see status-right)
#
#    defaults: do not monitor activity
set -g monitor-activity off
bind a set -w monitor-activity

bind M-j command-prompt -p "join pane from:"  "join-pane -s ':%%'"
bind M-s command-prompt -p "send pane to:"  "join-pane -t ':%%'"

# STATUSLINE
set -g status-interval 1
set -g status-left "#[fg=colour2]▉#[fg=colour4]▉#[fg=colour5]▉#[fg=colour10] #[bold]#H:#[fg=colour14]#S "
set -g status-left-length 24

if-shell '[[ $(echo "$(tmux -V | cut -d" " -f2) >= 2.1" | bc) -eq 1 ]]' \
  'set -g status-right \
"#(tmux show -w monitor-activity) \
mouse #(tmux show -gv mouse)  \
%a-%d-%b %T #[fg=colour5]▉#[fg=colour4]▉#[fg=colour2]▉"' \
  'set -g status-right \
"#(tmux show -w monitor-activity) \
M #(tmux show -gv mode-mouse) \
%a-%d-%b %T #[fg=colour5]▉#[fg=colour4]▉#[fg=colour2]▉"'

set -g status-right-length 56
set -g status-justify left

# WINDOWS
set -w -g window-status-current-format " #[bold]#I:#W#F "
set -w -g window-status-format " #I:#W#F "
set -w -g alternate-screen on

# COLORS
set -g default-terminal "screen-256color"
