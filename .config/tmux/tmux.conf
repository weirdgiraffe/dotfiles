# vim: ts=2 sw=2
# set -g default-shell "${SHELL}"
set -g default-command "reattach-to-user-namespace -l ${SHELL}"

# ensure utf8 support for older tmux versions
if-shell -b '[ "$(echo "$TMUX_VERSION < 2.2" | bc)" = 1 ]' {
    set -g utf8 on
    set -g status-utf8 on
    set -g mouse-utf8 on
}

set -g base-index 1         # enumerate windows starting from 1
set -g renumber-windows on  # renumber windows after they are closed
set -sg escape-time 1       # set no delay for escape key press
setw  -g pane-base-index 1  # enumerate panes starting from 1

# to enable images preview in yazi 
# see: https://yazi-rs.github.io/docs/image-preview/#tmux
set -g allow-passthrough all
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM


# set terminal window title to be a name of tmux window
set-option -g set-titles on
set-option -g set-titles-string "#S / #W"

# new window while keeping current path C-b-c
bind-key c new-window -c '#{pane_current_path}'

# new horisontal pane while keeping current path C-b-%
bind-key %   split-window -h -c "#{pane_current_path}"

# new vertical pane while keeping current path C-b-"
bind-key '"' split-window -v -c "#{pane_current_path}"


# run terminal in popup for some operations like git 
bind M-t {
	display-message "terminal popup"
	display-popup -w 80% -h 80% -E -d "#{pane_current_path}" "zsh"
}

# open claude code inside of a popup
bind M-c run-shell '\
	WORKDIR=$(git -C #{pane_current_path} rev-parse --show-toplevel 2>/dev/null || echo #{pane_current_path});\
	SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)";\
	tmux has-session -t "claude:$SESSION" 2>/dev/null || (\
		tmux new-window -t "claude" -n "$SESSION" -c "$WORKDIR" "claude" 2>/dev/null || \
		tmux new-session -d -s "claude" -n "$SESSION" -c "$WORKDIR" "claude" \
	);\
	tmux display-popup -w 80% -h 80% -E "tmux attach -t claude:$SESSION \; set-option status off"'

# vim keybindings for panes traversal
unbind Left
unbind Down
unbind Up
unbind Right
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# do not monitor activity by default to avoid additional distractions
set -g monitor-activity off
# toggle activity monitor using C-b-a
bind a set -w monitor-activity

# reload tmux config file using <C-b-r>
bind M-r {
	source-file "~/.config/tmux/tmux.conf"
	display-message "reloading config"
}
 
# fix window numbers (when you have closed some windows and numbers are odd) using C-b-w
bind M-w  {
	move-window -r 
	display-message "fixing window numbers"
}
 
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n M-h if-shell "$is_vim" "send-keys M-h"  "select-pane -L"
bind-key -n M-j if-shell "$is_vim" "send-keys M-j"  "select-pane -D"
bind-key -n M-k if-shell "$is_vim" "send-keys M-k"  "select-pane -U"
bind-key -n M-l if-shell "$is_vim" "send-keys M-l"  "select-pane -R"
bind-key -T copy-mode-vi M-h select-pane -L
bind-key -T copy-mode-vi M-j select-pane -D
bind-key -T copy-mode-vi M-k select-pane -U
bind-key -T copy-mode-vi M-l select-pane -R

# turn on focus events reporting to focus detection in vim
set -g focus-events on

# defautl tmux terminal settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# enable extended terminal feature if they are not automatically detected
set -as terminal-features 'xterm*:extkeys'
set -s extended-keys on


## Mouse support:
set -g mouse off     # diasble mouse by default
bind m set -g mouse  # toggle mouse on and off

# use vim keys for traversal in selection and copy mode
# (note: not copy and paste from system clipboard)
unbind -Tcopy-mode-vi Space
unbind -Tcopy-mode-vi Enter
bind -Tcopy-mode-vi v send -X begin-selection
bind -Tcopy-mode-vi y send -X copy-selection

# Don't wrap searches; it's super confusing given tmux's reverse-ordering of
# position info in copy mode.
set-option -w -g wrap-search off

# Stay in copy mode on drag end.
# (Would use `bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X
# stop-selection` but it is a bit glitchy.)
unbind-key -T copy-mode-vi MouseDragEnd1Pane

# Scroll 3 lines at a time instead of default 5; don't extend dragged selections.
bind-key -T copy-mode-vi WheelUpPane select-pane\; send-keys -t'{mouse}' -X clear-selection\; send-keys -t'{mouse}' -X -N 3 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane\; send-keys -t'{mouse}' -X clear-selection\; send-keys -t'{mouse}' -X -N 3 scroll-down

# Make double and triple click work outside of copy mode (already works inside it with default bindings).
bind-key -T root DoubleClick1Pane if-shell -Ft'{mouse}' '#{alternate_on}' "send-keys -M" "copy-mode -t'{mouse}'; send-keys -t'{mouse}' -X select-word"
bind-key -T root TripleClick1Pane if-shell -Ft'{mouse}' '#{alternate_on}' "send-keys -M" "copy-mode -t'{mouse}'; send-keys -t'{mouse}' -X select-line"

# Don't exit copy mode on double or triple click.
bind-key -T copy-mode-vi DoubleClick1Pane if-shell -Ft'{mouse}' '#{alternate_on}' "send-keys -M" "copy-mode -t'{mouse}'; send-keys -t'{mouse}' -X select-word"
bind-key -T copy-mode-vi TripleClick1Pane if-shell -Ft'{mouse}' '#{alternate_on}' "send-keys -M" "copy-mode -t'{mouse}'; send-keys -t'{mouse}' -X select-line"

# For those times when C-c and q are not enough.
bind-key -T copy-mode-vi Escape send-keys -X cancel

# automatic window renaming (title)
setw -g automatic-rename on
setw -g automatic-rename-format "#{pane_current_command}"
setw -g alternate-screen on

# ------------------------------------- COLORS --------------------------------

## theme:
source-file $HOME/.config/tmux/everforest.conf
#source-file $HOME/.config/tmux/rose-pine.conf
#source-file $HOME/.config/tmux/flexoki.conf

## layout:
source-file $HOME/.config/tmux/colors.conf
# -----------------------------------------------------------------------------

# disable right mouse click
unbind -n MouseDown3Pane

# pass shift+enter to the underlying shell
bind -n S-Enter send-keys "\e[13;2u"
# pass ctrl+enter to the underlying shell
bind -n C-Enter send-keys "\e[13;5u"

# Disable terminal escape sequences that change the cursor shape
set -as terminal-overrides '*:Ss@:Se@'
